<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&family=Playwrite+GB+S:ital,wght@0,100..400;1,100..400&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
  <style>
    header{
      font-family: "Noto Sans TC", sans-serif;
      font-optical-sizing: auto;
      font-style: normal;
    }
    .cardContainer {
      width: 100%;
      height: 600px;
      display: flex;
      flex-wrap: wrap;
      background-color: #888;
      align-content: flex-start;
    }
    .card{
      width: 200px;
      height: 300px;
      background-color: #FF0;
      margin: 20px;
    }
    /* When the screen width is 640px or less */
    @media screen and (max-width: 640px) {
        .container {
            width: 100%;
        }
        .card{
          width: 110px;
          height: 180px;
          background-color: #FF0;
          margin: 6px;
        }
    }
  </style>
</head>
<body>
  <header>
    Konata的寵物店
  </header>
  <div class="cardContainer" id="cardContainer">
  </div>
  <button onclick="addCard()">+</button>

  <script>
  function addCard() {
      var card = document.createElement('div');
      card.id = "card";
      card.className = "card";
      document.getElementById('cardContainer').appendChild(card);
    }
  </script>
</body>

</html>
