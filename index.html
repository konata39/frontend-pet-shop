<html>
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&family=Playwrite+GB+S:ital,wght@0,100..400;1,100..400&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
  <style>
    .banner img{
      width: 100%;
      height: 300px;
      margin-bottom: 5px;
    }
    .banner .title p{
      font-family: "Noto Sans TC", sans-serif;
      font-optical-sizing: auto;
      font-style: normal;
      width: 100%;
      position: absolute;
      display: flex;
      justify-content: center;
      top: 70px;
      font-size: 50px;
    }
    .cardContainer {
      width: 100%;
      height: 1750px;
      display: flex;
      flex-wrap: wrap;
      background-color: #BBB;
      align-content: flex-start;
    }
    .card{
      width: 200px;
      height: 300px;
      background-color: #FFF;
      transition: transform .2s; /* Animation */
      box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
      margin: 50px;
      border-radius: 5px;
    }
    .card:hover{
      transform: scale(1.3);
    }
    .cardName{
      font-family: "Noto Sans TC", sans-serif;
      font-optical-sizing: auto;
      font-style: normal;
      text-align: center;
      vertical-align: middle;
      line-height: 25px;
      width: 150px;
      height: 30px;
      background-color: #BBB;
      margin: auto;
      margin-top: 10px;
      border-radius: 5px;
      font-size: 18pt;
    }
    .cardImage{
      line-height: 25px;
      width: 150px;
      height: 150px;
      position: relative;
      left:25px;
      top:50px;
      margin: auto;
    }
    /* When the screen width is 640px or less */
    @media screen and (max-width: 640px) {
      .cardContainer {
        width: 100%;
        height: 1750px;
        display: flex;
        flex-wrap: wrap;
        background-color: #888;
        align-content: flex-start;
      }
        .card{
          width: 110px;
          height: 180px;
          background-color: #FF0;
          margin: 6px;
          border-radius: 5px;
        }
        .cardName{
          font-family: "Noto Sans TC", sans-serif;
          font-optical-sizing: auto;
          font-style: normal;
          text-align: center;
          vertical-align: middle;
          line-height: 25px;
          width: 150px;
          height: 30px;
          background-color: #BBB;
          margin: auto;
          margin-top: 10px;
          border-radius: 5px;
          font-size: 18pt;
        }
    }
  </style>
</head>
<body>
  <div class="banner">
        <img src="https://picsum.photos/id/559/1600/300">
        <div class="title">
            <p>Konata的寵物店</p>
        </div>
  </div>
  <div class="cardContainer" id="cardContainer">
  </div>
  <button onclick="getPokeAPI()">GET new PET!</button>
  <script>
  let nowCounter = 0;
  function getPokeAPI(){
    nowCounter += 1;
    fetch(`https://pokeapi.co/api/v2/pokemon/${nowCounter}/`)
    .then((response) => {
        return response.json();
    })
    .then( (response) => {
        //console.log(response.name);
        //console.log(response.sprites.front_default);
        var card = document.createElement('div');
        card.id = "card";
        card.className = "card";
        var cardName = document.createElement('div');
        cardName.id = "cardName";
        cardName.className = "cardName";
        cardName.innerText = response.name;
        var cardImage = document.createElement('img');
        cardImage.id = "cardImage";
        cardImage.className = "cardImage";
        cardImage.src = response.sprites.front_default;
        card.appendChild(cardName);
        card.appendChild(cardImage);
        document.getElementById('cardContainer').appendChild(card);
    })
    .catch((error) => {
        alert("Error on get API data!");
    })
  }
  </script>
</body>

</html>
